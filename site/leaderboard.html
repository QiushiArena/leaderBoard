<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Detector Benchmark Leaderboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Detector Benchmark</h1>

<input id="search" placeholder="Search detector">

<select id="sortBy" onchange="sortTable(this.value)">
    <option value="finalScore">Final Score</option>
    <option value="scoreMix">Score Mix</option>
    <option value="scoreIter">Score Iter</option>
    <option value="scoreRub">Score Rub</option>
</select>

<table id="leaderboard">
<thead>
<tr>
<th onclick="sortTable('detector')">Detector</th>
<th onclick="sortTable('scoreMix')">Score Mix</th>
<th onclick="sortTable('scoreIter')">Score Iter</th>
<th onclick="sortTable('scoreRub')">Score Rub</th>
<th onclick="sortTable('finalScore')">Final Score</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
